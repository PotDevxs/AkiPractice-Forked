# TYPE: MONGODB | FLAT_FILE | MYSQL | MARIADB | POSTGRESQL | POSTGRES | PG
# SQL: exige bloco DATABASE.SQL (host, utilizador, nome da base). DIALECT opcional se TYPE já for MYSQL ou POSTGRESQL.
DATABASE:
  TYPE: FLAT_FILE
  FLAT_FILE:
    FOLDER: flat-database
  SQL:
    DIALECT: MYSQL
    HOST: "127.0.0.1"
    PORT: 3306
    DATABASE: "practice"
    USERNAME: "root"
    PASSWORD: ""
    POOL_SIZE: 10
    # Opcional: URL JDBC completa (ignora HOST/PORT/DATABASE se preenchida)
    JDBC_URL: ""

MONGODB:
  URI-MODE: false
  DATABASE: "saki"
  NORMAL:
    HOST: "127.0.0.1"
    PORT: 27017
    AUTH:
      ENABLED: false
      USERNAME: "user"
      PASSWORD: "pass"
      AUTH-DATABASE: "admin"
  URI:
    CONNECTION-STRING: ""

SPAWN: ""

COLOR:
  PRIMARY: "AQUA"
  SECONDARY: "WHITE"

MATCH:
  REMOVE-EMPTY-BOTTLE: true

KNOCKBACK:
  SETTINGS:
    PACKET-MODE: true
    RESTORE-SERVER-MOTION: true
    TRACK-SERVER-SPRINT: true
  PROFILES:
    default:
      HORIZONTAL: 0.39
      VERTICAL: 0.37
      EXTRA-HORIZONTAL: 0.12
      EXTRA-VERTICAL: 0.02
      VERTICAL-MIN: 0.00
      VERTICAL-MAX: 0.40
      AIR-HORIZONTAL: 1.00
      AIR-VERTICAL: 1.00
      HORIZONTAL-FRICTION: 0.60
      VERTICAL-FRICTION: 1.00
      ADD-HORIZONTAL: 0.00
      ADD-VERTICAL: 0.00
      STOP-SPRINT: true
    boxing:
      HORIZONTAL: 0.36
      VERTICAL: 0.35
      EXTRA-HORIZONTAL: 0.08
      EXTRA-VERTICAL: 0.01
      VERTICAL-MIN: 0.00
      VERTICAL-MAX: 0.39
      AIR-HORIZONTAL: 0.98
      AIR-VERTICAL: 0.95
      HORIZONTAL-FRICTION: 0.60
      VERTICAL-FRICTION: 1.00
      ADD-HORIZONTAL: 0.00
      ADD-VERTICAL: 0.00
      STOP-SPRINT: true
    combo:
      HORIZONTAL: 0.34
      VERTICAL: 0.33
      EXTRA-HORIZONTAL: 0.03
      EXTRA-VERTICAL: 0.00
      VERTICAL-MIN: 0.00
      VERTICAL-MAX: 0.37
      AIR-HORIZONTAL: 0.95
      AIR-VERTICAL: 0.90
      HORIZONTAL-FRICTION: 0.65
      VERTICAL-FRICTION: 1.00
      ADD-HORIZONTAL: 0.00
      ADD-VERTICAL: 0.00
      STOP-SPRINT: false
    sumo:
      HORIZONTAL: 0.46
      VERTICAL: 0.36
      EXTRA-HORIZONTAL: 0.16
      EXTRA-VERTICAL: 0.01
      VERTICAL-MIN: 0.00
      VERTICAL-MAX: 0.40
      AIR-HORIZONTAL: 1.00
      AIR-VERTICAL: 0.95
      HORIZONTAL-FRICTION: 0.55
      VERTICAL-FRICTION: 1.00
      ADD-HORIZONTAL: 0.00
      ADD-VERTICAL: 0.00
      STOP-SPRINT: true

# Efeitos ao matar (no local da morte) e ao vencer (no vencedor). Valores: FLAME, EXPLOSION, VILLAGER_HAPPY, CRIT, NONE
COSMETICS:
  KILL-EFFECT: EXPLOSION
  VICTORY-EFFECT: FIREWORK

# XP por partida (win/loss). Nível = xp / 100 (ex.: 500 xp = nível 5). Use 0 para desativar.
XP:
  PER-WIN: 25
  PER-LOSS: 5

# Ao subir de nível (100 XP = 1 nível): mensagens, comandos de consola e itens no inventário.
# Se o jogador subir vários níveis de uma vez, todas as recompensas intermediárias são aplicadas.
LEVEL-REWARDS:
  ENABLED: false
  DEFAULT-LEVEL-UP-MESSAGE: "&eSubiste para o nível &f%level%&e!"
  BROADCAST: false
  BROADCAST-MESSAGE: "&e%player% &7subiu para o nível &f%level%&7!"
  LEVELS:
    # Exemplo (descomente e ajuste):
    # "5":
    #   LEVEL-UP-MESSAGE: "&6Recompensa de marco: nível 5!"
    #   MESSAGES:
    #     - "&7Ganhaste um prémio por alcançares o nível 5."
    #   COMMANDS:
    #     - "say Parabéns %player% pelo nível %level%!"
    #   ITEMS:
    #     - "DIAMOND:1"
    #     - "GOLD_INGOT:3"

# Missão diária: objetivo aleatório, reset a cada dia. Recompensa em XP.
MISSION:
  REWARD-XP: 100
  TARGET-WIN-RANKED: 3
  TARGET-WIN-CASUAL: 3
  TARGET-PLAY-FFA: 5
  # Mensagem no chat ao entrar (resumo da missão do dia)
  SHOW-JOIN-HINT: true

# Recompensa em XP para o vencedor de qualquer evento (Brackets, Sumo, TNT Run, TNT Tag). 0 = desativado.
EVENT:
  REWARD-XP: 50

QUEUE:
  # Ranked: ping máximo para matchmaking (0 = desativado). Ex: 150 = só emparelha se ambos tiverem ping <= 150
  RANKED-MAX-PING: 0
  # Backfill: range inicial de ELO e incremento a cada 3 segundos (já existente no código)
  INITIAL-ELO-RANGE: 25
  ELO-RANGE-STEP: 5
  # Anti-boost: não emparelhar jogadores com mesmo IP na ranked (true/false)
  ANTI-BOOST-SAME-IP: true

HOLOGRAMS:
  # Top jogadores por nível (ordenado por XP total — maior nível sempre em 1º).
  # Defina LOCATION com /leaderboard setup-level (ou edite manualmente). "null" = desligado.
  LEVEL-LEADERBOARDS:
    FORMAT: "<top>. <name> &eNv. &f<level> &7(&a<xp> XP&7)"
    LOCATION: "null"
    ENTRIES: 10
    UPDATABLE-TIME: 30
    UPDATABLE: true
    REFRESH-TIME: 1
    LINES:
      - "&b&lTOP NÍVEL"
      - ""
      - "<lines>"
  WIN-STREAK-LEADERBOARDS:
    FORMAT: "<top>. <name> STREAK: <streak>"
    LOCATION: world:-414.5:159.0:-2842.5
    UPDATABLE-TIME: 20
    UPDATABLE: true
    REFRESH-TIME: 1
    LINES:
      - "&b&lTOP WINSTREAK"
      - ""
      - "<lines>"
  KIT-ELO-LEADERBOARDS:
    FORMAT: "<top>. <name> ELO: <elo>"
    LOCATION: world:-414.5:159.0:-2842.5
    UPDATABLE-TIME: 20
    UPDATABLE: true
    REFRESH-TIME: 1
    LINES:
      - "&b&lTOP ELO"
      - ""
      - "<lines>"

  GLOBAL-LEADERBOARDS:
    FORMAT: "<top>. <name> ELO: <elo>"
    LOCATION: world:-414.5:159.0:-2842.5
    UPDATABLE-TIME: 20
    UPDATABLE: true
    REFRESH-TIME: 1
    LINES:
      - "&b&lTOP GLOBAL-ELO"
      - ""
      - "<lines>"

ANIMATIONS:
  FOOTER:
    WRITE-EFFECT: false
    COLOR-TRAIL-EFFECT: false
    COLOR-TRAIL-MAIN: "&b"
    COLOR-TRAIL-SECONDARY: "&f"
    FLASH-COLOURS-ON-FINISH-ANIMATION: true
    TIME: 0.5 #Calculated in seconds
    TEXT:
      - "saki.dev"
      - "twitter.com/sakidev"
  TITLE:
    WRITE-EFFECT: false
    COLOR-TRAIL-EFFECT: false
    COLOR-TRAIL-MAIN: "&b"
    COLOR-TRAIL-SECONDARY: "&f"
    FLASH-COLOURS-ON-FINISH-ANIMATION: false
    TIME: 0.5 #Calculated in seconds
    TEXT:
      - "Saki Practice"

# PlaceholderAPI (com PlaceholderAPI no servidor): use %practice_<id>% ou %akipractice_<id>%
# theme, primary, secondary | level, lvl | xp | xp_in_level | xp_to_next
# daily_mission, mission | daily_mission_progress | daily_mission_target | daily_mission_type
